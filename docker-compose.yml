name: pasted

x-database-environment: &database-environment
  DATABASE_URL: ${DATABASE_URL:-postgres://pasted:pasted@postgres:5432/pasted}
  DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-10}

x-app-environment: &app-environment
  <<: *database-environment
  ORIGIN: ${ORIGIN:-http://localhost:3000}
  BODY_SIZE_LIMIT: ${BODY_SIZE_LIMIT:-64M}
  BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET to at least 32 random characters}
  GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
  GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pasted}
      POSTGRES_USER: ${POSTGRES_USER:-pasted}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pasted}
    expose:
      - '5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped
    stop_grace_period: 30s
    volumes:
      - postgres-data:/var/lib/postgresql

  migrate:
    build:
      context: .
      target: migrate
    environment: *database-environment
    command: ['pnpm', 'db:migrate']
    depends_on:
      postgres:
        condition: service_healthy
    restart: 'no'

  app:
    build:
      context: .
      target: runner
    environment: *app-environment
    ports:
      - '${APP_PORT:-3000}:3000'
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:size=64m,mode=1777
    restart: unless-stopped
    stop_grace_period: 20s

  worker:
    build:
      context: .
      target: worker
    environment:
      <<: *database-environment
      WORKER_ID: ${WORKER_ID:-metadata-worker-1}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    init: true
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:size=64m,mode=1777
    restart: unless-stopped
    stop_grace_period: 30s

  seed:
    profiles: ['demo']
    build:
      context: .
      target: migrate
    environment:
      <<: *database-environment
      DEMO_USER_EMAIL: ${DEMO_USER_EMAIL:-demo@example.com}
      DEMO_USER_PASSWORD: ${DEMO_USER_PASSWORD:-demo-password-change-me}
    command: ['pnpm', 'db:seed']
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: 'no'

volumes:
  postgres-data:
