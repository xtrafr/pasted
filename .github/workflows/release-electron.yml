name: Build and draft desktop release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to use for the draft release, for example v1.0.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Type-check
        run: npm run typecheck

  build:
    needs: verify
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            command: build:linux
            artifact: linux
          - os: macos-latest
            command: build:mac
            artifact: macos
          - os: windows-latest
            command: build:win
            artifact: windows

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run ${{ matrix.command }}

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: pasted-${{ matrix.artifact }}
          path: |
            dist/*.AppImage
            dist/*.blockmap
            dist/*.deb
            dist/*.dmg
            dist/*.exe
            dist/*.snap
            dist/*.yml
            dist/*.zip
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.tag }}
          draft: true
          files: |
            dist/*.exe
            dist/*.zip
            dist/*.dmg
            dist/*.AppImage
            dist/*.snap
            dist/*.deb
            dist/*.rpm
            dist/*.tar.gz
            dist/*.yml
            dist/*.blockmap
